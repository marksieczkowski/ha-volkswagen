# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py313"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401",  # Dynamically typed expressions (typing.Any) are disallowed
    "D203",    # no-blank-line-before-class (incompatible with formatter)
    "D212",    # multi-line-summary-first-line (incompatible with formatter)
    "D213",    # multi-line-summary-second-line (conflicts with D212 + pylint C0199)
    "COM812",  # incompatible with formatter
    "ISC001",  # incompatible with formatter
    # Home Assistant integration patterns
    "TRY003",  # Long messages outside exception class — common HA pattern
    "EM101",   # Exception string literal — common HA pattern
    "EM102",   # Exception f-string literal — common HA pattern
    "BLE001",  # Blind exception catching — HA integrations need broad exception handling
    "S105",    # Possible hardcoded password — false positive for config-key constants
    "PTH118",  # os.path.join — pathlib migration not required
    "PTH103",  # os.makedirs — pathlib migration not required
    "PTH123",  # open() — pathlib migration not required
    "PTH112",  # os.path.isdir — pathlib migration not required
    "ARG002",  # Unused method argument — HA base-class signatures must be matched
    "ARG004",  # Unused static method argument — same reason
    "RUF012",  # Mutable ClassVar annotation — common HA entity class pattern
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25

[lint.per-file-ignores]
"tests/**" = [
    "S101",   # Use of `assert` detected - normal in tests
    "S105",   # Possible hardcoded password - test fixtures use fake values
    "SLF001", # Private member accessed - tests need to access private members
    "TC002",  # Move third-party import into TYPE_CHECKING block - tests need runtime imports
    "TC003",  # Move stdlib import into TYPE_CHECKING - tests need runtime imports
    "ANN001", # Missing type annotation for function argument - not required in tests
    "ANN201", # Missing return type annotation for public function - not required in tests
    "ANN202", # Missing return type annotation for private function - not required in tests
    "ARG001", # Unused function argument - pytest fixtures are referenced by name, not used
    "FBT001", # Boolean-typed positional argument - OK in test helpers
    "FBT002", # Boolean default positional argument - OK in test helpers
    "PT022",  # No teardown in fixture, use return - yield is HA test pattern
    "E402",   # Module level import not at top - test setup imports after fixtures
    "D103",   # Missing docstring in public function - test functions need not document
    "D104",   # Missing docstring in public package - tests/__init__.py need not document
    "ANN003", # Missing type annotation for **kwargs - not required in tests
    "PLR2004", # Magic value in comparison - numeric literals are normal in test assertions
    "PLR0915", # Too many statements - fixture setup can be lengthy
    "ERA001",  # Found commented-out code - TODO comments normal in tests
    "PLC0415", # Import not at top of file - some imports inside test functions for scoping
]
"custom_components/ha_volkswagen/run.py" = [
    "T201",  # print() - standalone dev/diagnostic script
    "D100",  # Missing module docstring
    "D400",  # Docstring should end with period
    "D401",  # Imperative mood
    "D415",  # Docstring punctuation
    "S101",  # assert - dev script
    "PTH118", # os.path.join - dev script
    "PTH123", # open() - dev script
    "UP015", # Unnecessary mode argument
]
